name: Update UCI Points Daily

on:
  schedule:
    # Kører hver dag kl. 06:00 UTC (07:00 dansk tid)
    - cron: '0 6 * * *'
  workflow_dispatch: # Tillader manuel kørsel

jobs:
  update-points:
    runs-on: ubuntu-latest

    # Gratis Cloudflare-bypass: FlareSolverr kører som container ved siden af jobbet.
    # Scraperne henter primært via den (http://localhost:8191); cloudscraper er kun backup.
    services:
      flaresolverr:
        image: ghcr.io/flaresolverr/flaresolverr:latest
        ports:
          - 8191:8191

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
    
    - name: Create credentials file
      run: |
        echo '${{ secrets.GOOGLE_CREDENTIALS }}' > cycling-fantasy-485220-faab21c57cd1.json

    - name: Wait for FlareSolverr
      run: |
        echo "Venter på at FlareSolverr bliver klar..."
        for i in $(seq 1 30); do
          if curl -sf http://localhost:8191/ >/dev/null; then
            echo "✅ FlareSolverr er klar"
            exit 0
          fi
          sleep 2
        done
        echo "⚠️ FlareSolverr svarede ikke i tide - fortsætter alligevel (cloudscraper prøves stadig)"

    - name: Run update script
      env:
        FLARESOLVERR_URL: http://localhost:8191/v1
      run: |
        python update_automatic_cloudscraper.py
        python scrape_upcoming_races.py
        python scrape_tdf_startlist.py
      
    - name: Show results
      if: always()
      run: |
        echo "Update completed!"
